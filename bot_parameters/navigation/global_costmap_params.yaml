global_costmap:
  global_frame: map
  robot_base_frame: base_footprint
  update_frequency: 1.0
  publish_frequency: 1.0
  transform_tolerance: 2.0
  footprint_padding: 0.1
  static_map: true
  rolling_window: false
  resolution: 0.1
  width: 50
  height: 50
 
  plugins:
    - {name: static_layer,           type: "costmap_2d::StaticLayer"}
    # - {name: obstacle_layer,         type: "costmap_2d::VoxelLayer"}
    - {name: global_obstacle_layer,  type: "costmap_2d::ObstacleLayer"}
    - {name: global_inflation_layer, type: "costmap_2d::InflationLayer"}

  static_layer: {enabled: true, lethal_cost_threshold: 60, map_topic: map}
  global_inflation_layer: {cost_scaling_factor: 2.5, enabled: true, inflation_radius: 1.75}
  global_obstacle_layer:
    combination_method: 1
    track_unknown_space: true
    publish_voxel_map: False
    iterative_reset_costmap_enabled: False 

    enabled: true
    front_offset: 0.2
    inflation_radius: 0.2
    observation_sources: laser_scan_sensor
    laser_scan_sensor: {sensor_frame: base_laser_link, clearing: true, data_type: LaserScan, marking: true, topic: scan}
    max_obstacle_height: 0.5
    min_obstacle_height: 0.1
    obstacle_range: 10.0
    raytrace_range: 11.0
    rear_offset: 0.05
    side_offset: 0.05
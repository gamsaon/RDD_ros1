local_costmap:
  global_frame: map
  robot_base_frame: base_link

  update_frequency: 3.0     # 20
  publish_frequency: 3.0    # 20
  transform_tolerance: 0.5

  static_map: false

# Rolling Window Related Parameters  
  rolling_window: true
  resolution: 0.05
  width: 5.0   # 10.0
  height: 5.0  # 10.0
  always_send_full_costmap: true


  plugins:
    # - {name: obstacle_layer, type: "costmap_2d::VoxelLayer"}
    - {name: local_obstacle_layer,  type: "costmap_2d::ObstacleLayer"}
    - {name: local_inflation_layer, type: "costmap_2d::InflationLayer"}

  local_inflation_layer: {cost_scaling_factor: 5.0, enabled: true, inflation_radius: 1.8}

  local_obstacle_layer:
    combination_method: 1
    enabled: true
    front_offset: 0.2
    inflation_radius: 0.2
    observation_sources: laser_scan_sensor
    laser_scan_sensor: {clearing: true, data_type: LaserScan, marking: true, topic: scan}
    max_obstacle_height: 0.5
    min_obstacle_height: 0.1
    obstacle_range: 10.0
    raytrace_range: 51.0
    rear_offset: 0.05
    side_offset: 0.05
    track_unknown_space: true
    iterative_reset_costmap_enabled: True